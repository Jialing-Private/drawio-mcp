version: "3.8"

services:
  drawio-mcp:
    build:
      context: .
      dockerfile: Dockerfile.arm64
    image: drawio-mcp:arm64-latest
    container_name: drawio-mcp-arm64
    ports:
      - "20000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LISTEN=0.0.0.0
      # 如需对接自建 draw.io 实例，取消下行注释
      # - DRAWIO_BASE_URL=https://drawio.yourcompany.com/
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
